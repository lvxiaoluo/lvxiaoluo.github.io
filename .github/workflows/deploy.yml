name: Deploy to GitHub Pages

on:
  # 每次推送到 `main` 分支时触发这个"工作流程"
  # 如果你使用了别的分支名，请按需将 `main` 替换成你的分支名
  push:
    branches: [main]
  repository_dispatch:  # 添加这个触发器
    types:
      - content-updated
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 添加 SSH 配置步骤
#      - name: Setup SSH Key
#        uses: webfactory/ssh-agent@v0.8.0
#        with:
#          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Checkout your repository using git
        uses: actions/checkout@v4
        with:
          submodules: false  # 支持 Git Submodule 模式
          token: ${{ secrets.GITHUB_TOKEN }}  # 自动访问同账号下的私有仓库
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
          
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: pnpm run build
        env:
          # 如果需要启用内容分离,取消以下注释并配置
          ENABLE_CONTENT_SYNC: true
          CONTENT_REPO_URL: ${{ secrets.CONTENT_REPO_URL }}
          USE_SUBMODULE: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
#      - name: Deploy to pages branch
#        uses: JamesIves/github-pages-deploy-action@v4
#        with:
#          branch: pages # 部署到pages分支
#          folder: dist # Astro默认构建输出目录
#          clean: true # 清理目标分支中的旧文件